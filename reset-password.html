<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jelszó visszaállítás – AeroHost</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#060611;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{background:#0f0f1a;border:1px solid rgba(255,255,255,0.08);border-radius:24px;padding:48px 40px;max-width:440px;width:100%}
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:32px;justify-content:center}
  .logo{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#4c1d95,#7c3aed);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:0.8rem;color:#fff}
  .brand-name{font-weight:800;color:#fff;font-size:1.1rem}
  h1{font-size:1.4rem;font-weight:800;color:#fff;margin-bottom:8px;letter-spacing:-0.02em;text-align:center}
  .subtitle{color:rgba(148,163,184,0.7);font-size:0.88rem;text-align:center;margin-bottom:28px;line-height:1.6}
  label{display:block;font-size:0.82rem;font-weight:600;color:rgba(148,163,184,0.9);margin-bottom:6px;margin-top:16px}
  input{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:10px;padding:12px 14px;color:#fff;font-size:0.92rem;outline:none;transition:border .2s}
  input:focus{border-color:rgba(124,58,237,0.6);background:rgba(124,58,237,0.05)}
  .btn{display:block;width:100%;padding:14px;background:linear-gradient(135deg,#1d4ed8,#7c3aed);border-radius:50px;color:#fff;font-weight:700;font-size:0.95rem;border:none;cursor:pointer;margin-top:24px;transition:opacity .2s}
  .btn:hover{opacity:0.9}
  .btn:disabled{opacity:0.5;cursor:not-allowed}
  .msg{margin-top:16px;padding:12px 16px;border-radius:10px;font-size:0.85rem;text-align:center;display:none}
  .msg.success{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.25);color:#4ade80;display:block}
  .msg.error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);color:#f87171;display:block}
  .strength{height:4px;border-radius:2px;margin-top:6px;transition:all .3s;background:rgba(255,255,255,0.08)}
  .strength.weak{background:#ef4444;width:33%}
  .strength.medium{background:#f59e0b;width:66%}
  .strength.strong{background:#22c55e;width:100%}
</style>
</head>
<body>
<div class="card">
  <div class="brand">
    <div class="logo">AE</div>
    <span class="brand-name">AeroHost</span>
  </div>

  <div id="form-section">
    <h1>Új jelszó beállítása</h1>
    <p class="subtitle">Add meg az új jelszavadat. Legalább 8 karakter legyen.</p>

    <label for="pw">Új jelszó</label>
    <input type="password" id="pw" placeholder="Minimum 8 karakter" autocomplete="new-password">
    <div class="strength" id="strength"></div>

    <label for="pw2">Jelszó megerősítése</label>
    <input type="password" id="pw2" placeholder="Ismételd meg a jelszót" autocomplete="new-password">

    <button class="btn" id="btn" onclick="submit()">Jelszó beállítása →</button>
    <div class="msg" id="msg"></div>
  </div>

  <div id="done-section" style="display:none;text-align:center">
    <div style="font-size:3rem;margin-bottom:20px">🔐</div>
    <h1>Jelszó beállítva!</h1>
    <p class="subtitle" style="margin-bottom:24px">Az új jelszavaddal már be tudsz jelentkezni.</p>
    <a href="/login.html" class="btn" style="text-decoration:none;display:inline-block;width:auto;padding:14px 32px">Bejelentkezés →</a>
  </div>
</div>

<script>
const token = new URLSearchParams(location.search).get('token');
if (!token) {
  document.getElementById('msg').className = 'msg error';
  document.getElementById('msg').textContent = 'Érvénytelen link. Kérj új jelszó-visszaállítást.';
  document.getElementById('btn').disabled = true;
}

document.getElementById('pw').addEventListener('input', function() {
  const s = document.getElementById('strength');
  const v = this.value;
  if (!v) { s.className = 'strength'; return; }
  const score = (v.length >= 8 ? 1 : 0) + (/[A-Z]/.test(v) ? 1 : 0) + (/[0-9]/.test(v) ? 1 : 0) + (/[^A-Za-z0-9]/.test(v) ? 1 : 0);
  s.className = score <= 1 ? 'strength weak' : score <= 2 ? 'strength medium' : 'strength strong';
});

async function submit() {
  const pw  = document.getElementById('pw').value;
  const pw2 = document.getElementById('pw2').value;
  const msg = document.getElementById('msg');
  const btn = document.getElementById('btn');
  msg.className = 'msg';

  if (pw.length < 8) { msg.className = 'msg error'; msg.textContent = 'A jelszónak legalább 8 karakter hosszúnak kell lennie.'; return; }
  if (pw !== pw2)    { msg.className = 'msg error'; msg.textContent = 'A két jelszó nem egyezik.'; return; }

  btn.disabled = true;
  btn.textContent = 'Feldolgozás...';

  try {
    const r = await fetch('/api/auth/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password: pw })
    });
    const data = await r.json();
    if (!r.ok) {
      msg.className = 'msg error';
      msg.textContent = data.error || 'Hiba történt.';
      btn.disabled = false;
      btn.textContent = 'Jelszó beállítása →';
    } else {
      document.getElementById('form-section').style.display = 'none';
      document.getElementById('done-section').style.display = 'block';
    }
  } catch {
    msg.className = 'msg error';
    msg.textContent = 'Hálózati hiba. Próbáld újra.';
    btn.disabled = false;
    btn.textContent = 'Jelszó beállítása →';
  }
}
</script>
</body>
</html>
