<!DOCTYPE html><html lang="hu" class="dark"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Szerver | AeroHost</title>
<meta name="description" content="Game szerver oldal">
<link rel="icon" href="logo.png">
<link rel="stylesheet" href="_next/static/chunks/a5f94a35a4f4cbe8.css" data-precedence="next">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#060611;color:#e2e8f0;min-height:100vh;-webkit-font-smoothing:antialiased}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes countdown-tick{0%{transform:scale(1.08)}100%{transform:scale(1)}}
.fade-up{animation:fadeUp 0.5s ease-out forwards}
.animate-pulse{animation:pulse 2s cubic-bezier(0.4,0,0.6,1) infinite}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:99px;font-size:0.7rem;font-weight:600}
.badge-green{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.2);color:#4ade80}
.badge-yellow{background:rgba(234,179,8,0.1);border:1px solid rgba(234,179,8,0.2);color:#facc15}
.badge-red{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#f87171}
.badge-purple{background:rgba(168,85,247,0.1);border:1px solid rgba(168,85,247,0.2);color:#c084fc}
.card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:20px}
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 20px;border-radius:10px;font-size:0.88rem;font-weight:600;border:none;cursor:pointer;transition:all 0.2s;font-family:inherit;text-decoration:none}
.btn-purple{position:relative;overflow:hidden;color:#fff;box-shadow:0 6px 16px -6px rgba(168,85,247,0.45)}
.btn-purple .bp-bg{position:absolute;inset:0;background:linear-gradient(135deg,#1d4ed8,#7c3aed,#4338ca);z-index:0}
.btn-purple span{position:relative;z-index:1}
.btn-ghost{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.10);color:rgba(209,213,219,0.9)}
.btn-ghost:hover{background:rgba(255,255,255,0.09);color:#fff}

/* COMING SOON */
.cs-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center;position:relative;overflow:hidden}
.cs-bg{position:absolute;inset:0;background:radial-gradient(ellipse at center top,rgba(124,58,237,0.18) 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(29,78,216,0.12) 0%,transparent 50%);pointer-events:none}
.cs-logo{display:inline-flex;align-items:center;gap:10px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:50px;padding:8px 20px 8px 8px;margin-bottom:40px}
.cs-title{font-size:clamp(2rem,6vw,3.5rem);font-weight:900;color:#fff;letter-spacing:-0.03em;line-height:1.1;margin-bottom:16px}
.cs-sub{font-size:1rem;color:rgba(156,163,175,0.8);max-width:440px;line-height:1.7;margin-bottom:40px}
.countdown-wrap{display:flex;gap:12px;justify-content:center;margin-bottom:40px;flex-wrap:wrap}
.count-box{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.10);border-radius:16px;padding:20px 24px;min-width:80px;text-align:center}
.count-num{font-size:2.2rem;font-weight:800;color:#fff;line-height:1;font-variant-numeric:tabular-nums;display:block}
.count-num.tick{animation:countdown-tick 0.3s ease-out}
.count-label{font-size:0.65rem;color:rgba(107,114,128,0.7);text-transform:uppercase;letter-spacing:0.1em;margin-top:6px;display:block}
.cs-discord{display:inline-flex;align-items:center;gap:8px;padding:10px 22px;background:rgba(88,101,242,0.12);border:1px solid rgba(88,101,242,0.25);border-radius:12px;color:#a5b4fc;font-size:0.88rem;font-weight:600;text-decoration:none;transition:background 0.2s}
.cs-discord:hover{background:rgba(88,101,242,0.2)}
.cs-game-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 14px;border-radius:99px;background:rgba(168,85,247,0.08);border:1px solid rgba(168,85,247,0.2);color:#c084fc;font-size:0.75rem;font-weight:600;margin-bottom:20px}

/* LIVE SERVER */
.live-wrap{max-width:900px;margin:0 auto;padding:40px 20px}
.hero{position:relative;border-radius:24px;overflow:hidden;margin-bottom:24px;height:220px}
.hero img{width:100%;height:100%;object-fit:cover}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,0.1) 0%,rgba(6,6,17,0.92) 100%)}
.hero-content{position:absolute;bottom:0;left:0;right:0;padding:28px 32px}
.info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:24px}
.info-card{padding:18px 20px}
.info-label{font-size:0.65rem;color:rgba(107,114,128,0.7);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px}
.info-value{font-size:0.95rem;font-weight:700;color:#fff}
.tag{padding:3px 10px;background:rgba(168,85,247,0.08);border:1px solid rgba(168,85,247,0.18);border-radius:6px;font-size:0.72rem;color:#c084fc;display:inline-block;margin:2px}
.ip-box{background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px 18px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color 0.2s}
.ip-box:hover{border-color:rgba(168,85,247,0.4)}
.nav-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:rgba(5,5,5,0.95);border-bottom:1px solid rgba(255,255,255,0.07);position:sticky;top:0;z-index:10;backdrop-filter:blur(20px)}
</style>
</head>
<body>

<div id="app">
  <!-- Betöltés -->
  <div id="loading" style="min-height:100vh;display:flex;align-items:center;justify-content:center">
    <div style="width:32px;height:32px;border:3px solid rgba(168,85,247,0.3);border-top-color:#a855f7;border-radius:50%;animation:spin 0.8s linear infinite"></div>
  </div>
</div>

<script>
var SITE_URL = window.location.origin;

// slug kinyerése az URL-ből — /server/my-slug
var slug = window.location.pathname.replace(/^\/server\//, '').replace(/\/$/, '').split('/')[0];
if (!slug) {
  document.getElementById('app').innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;color:rgba(107,114,128,0.6)">Hiányzó szerver azonosító.</div>';
}

var GAME_LABELS = {minecraft:'Minecraft',rust:'Rust',cs2:'CS2',palworld:'Palworld',valheim:'Valheim',ark:'ARK Survival','project-zomboid':'Project Zomboid'};
var GAME_IMGS   = {minecraft:'games/minecraft-bg.jpg',rust:'games/rust-bg.jpg',cs2:'games/cs2-bg.jpg',palworld:'games/palworld-bg.jpg',valheim:'games/valheim-bg.jpg',ark:'games/ark-bg.jpg','project-zomboid':'games/zomboid-bg.jpg'};
var PLAN_LABELS = {starter:'Starter · 4GB RAM',pro:'Pro · 8GB RAM',elite:'Elite · 16GB RAM'};

function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function copyIp(ip) {
  navigator.clipboard.writeText(ip).then(function(){
    var btn = document.getElementById('copy-ip-btn');
    if (btn) { btn.textContent = 'Másolva!'; setTimeout(function(){ btn.textContent = 'Másolás'; }, 2000); }
  });
}

// ── COMING SOON renderer ──────────────────────────────────────────────────
function renderComingSoon(data) {
  var cs  = data.comingSoon;
  var srv = data.server;
  var p   = data.profile;

  document.title = (p.title || srv.name || 'Szerver') + ' — Hamarosan | AeroHost';

  var bgStyle = cs.bgColor && cs.bgColor !== '#060611'
    ? 'background:' + cs.bgColor
    : '';

  var gameLabel = GAME_LABELS[srv.game] || srv.game || '';
  var gameBadge = gameLabel ? '<div class="cs-game-badge"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="16" height="16" x="4" y="4" rx="2"/><rect width="6" height="6" x="9" y="9" rx="1"/></svg>' + escHtml(gameLabel) + '</div>' : '';

  var countdownHtml = '';
  if (cs.launchAt) {
    countdownHtml = '<div class="countdown-wrap" id="countdown-wrap">'
      + '<div class="count-box"><span class="count-num" id="cd-days">00</span><span class="count-label">Nap</span></div>'
      + '<div class="count-box"><span class="count-num" id="cd-hours">00</span><span class="count-label">Óra</span></div>'
      + '<div class="count-box"><span class="count-num" id="cd-mins">00</span><span class="count-label">Perc</span></div>'
      + '<div class="count-box"><span class="count-num" id="cd-secs">00</span><span class="count-label">Másodperc</span></div>'
      + '</div>';
  }

  var discordHtml = cs.discordUrl
    ? '<a href="' + escHtml(cs.discordUrl) + '" target="_blank" rel="noopener" class="cs-discord">'
      + '<svg width="18" height="18" viewBox="0 0 24 24" fill="#5865F2"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128c.126-.094.252-.192.372-.292a.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>'
      + 'Csatlakozz a Discordra'
      + '</a>'
    : '';

  document.getElementById('app').innerHTML = '<div class="cs-wrap" style="' + bgStyle + '">'
    + '<div class="cs-bg"></div>'
    + '<a href="/" class="cs-logo"><img src="logo.png" width="32" height="32" style="border-radius:50%"><span style="font-size:1.1rem;font-weight:800;color:#fff">AeroHost</span></a>'
    + gameBadge
    + '<h1 class="cs-title fade-up">' + escHtml(cs.headline || 'Hamarosan nyitunk!') + '</h1>'
    + (cs.subtext ? '<p class="cs-sub fade-up">' + escHtml(cs.subtext) + '</p>' : '')
    + countdownHtml
    + discordHtml
    + '<div style="position:absolute;bottom:20px;left:0;right:0;text-align:center;font-size:0.72rem;color:rgba(107,114,128,0.4)">Powered by <a href="/" style="color:rgba(168,85,247,0.6);text-decoration:none">AeroHost</a></div>'
    + '</div>';

  // Visszaszámláló
  if (cs.launchAt) {
    var target = new Date(cs.launchAt).getTime();
    var pad = function(n){ return String(Math.max(0,n)).padStart(2,'0'); };
    var prev = {};
    function tick() {
      var now  = Date.now();
      var diff = target - now;
      if (diff <= 0) { document.getElementById('countdown-wrap') && (document.getElementById('countdown-wrap').innerHTML = '<div style="font-size:1.2rem;font-weight:700;color:#4ade80">🎉 Megnyitott!</div>'); return; }
      var days  = Math.floor(diff / 86400000);
      var hours = Math.floor((diff % 86400000) / 3600000);
      var mins  = Math.floor((diff % 3600000)  / 60000);
      var secs  = Math.floor((diff % 60000)    / 1000);
      var vals = {days:days, hours:hours, mins:mins, secs:secs};
      ['days','hours','mins','secs'].forEach(function(k) {
        var el = document.getElementById('cd-'+k);
        if (!el) return;
        var str = pad(vals[k]);
        if (el.textContent !== str) {
          el.textContent = str;
          el.classList.remove('tick');
          void el.offsetWidth;
          el.classList.add('tick');
        }
      });
      prev = vals;
    }
    tick();
    setInterval(tick, 1000);
  }
}

// ── LIVE SERVER renderer ──────────────────────────────────────────────────
function renderLiveServer(data) {
  var srv = data.server;
  var p   = data.profile;

  var title    = p.title || srv.name;
  var gameLabel = GAME_LABELS[srv.game] || srv.game || '';
  var imgSrc   = GAME_IMGS[srv.game]   || 'Backgrounds/game-bg.png';

  document.title = title + ' | AeroHost';
  document.querySelector('meta[name="description"]').setAttribute('content', p.description || title + ' — game szerver az AeroHoston');

  var statusBadge = srv.status === 'running'
    ? '<span class="badge badge-green"><span style="width:5px;height:5px;border-radius:50%;background:#4ade80" class="animate-pulse"></span>Online</span>'
    : (srv.status === 'paused'
      ? '<span class="badge badge-yellow">Szünetel</span>'
      : '<span class="badge badge-red">Offline</span>');

  var tagsHtml = p.tags
    ? p.tags.split(',').map(function(t){ return '<span class="tag">' + escHtml(t.trim()) + '</span>'; }).join('')
    : '';

  var ipHtml = srv.showIp && srv.pteroStatus
    ? '<div class="ip-box" onclick="copyIp(\'play.' + escHtml(slug) + '.aerohost.eu\')">'
      + '<div style="flex:1">'
      + '<div style="font-size:0.65rem;color:rgba(107,114,128,0.6);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:3px">Szerver IP</div>'
      + '<div style="font-size:1rem;font-weight:700;color:#fff;font-family:monospace">play.' + escHtml(slug) + '.aerohost.eu</div>'
      + '</div>'
      + '<button id="copy-ip-btn" style="background:rgba(168,85,247,0.1);border:1px solid rgba(168,85,247,0.25);border-radius:8px;color:#c084fc;font-size:0.78rem;font-weight:600;padding:6px 14px;cursor:pointer;font-family:inherit">Másolás</button>'
      + '</div>'
    : '';

  var html = '<div class="nav-bar">'
    + '<a href="/" style="display:flex;align-items:center;gap:8px;text-decoration:none"><img src="logo.png" width="28" height="28" style="border-radius:50%"><span style="font-size:1rem;font-weight:700;color:#fff">AeroHost</span></a>'
    + '<a href="/dashboard.html" class="btn btn-ghost" style="font-size:0.8rem;padding:7px 14px">Saját szerver →</a>'
    + '</div>'
    + '<div class="live-wrap fade-up">'
    // Hero
    + '<div class="hero">'
    + '<img src="' + imgSrc + '" alt="' + escHtml(title) + '">'
    + '<div class="hero-overlay"></div>'
    + '<div class="hero-content">'
    + '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">' + statusBadge
    + (gameLabel ? '<span class="badge badge-purple">' + escHtml(gameLabel) + '</span>' : '')
    + '</div>'
    + '<h1 style="font-size:1.8rem;font-weight:800;color:#fff;letter-spacing:-0.02em;margin-bottom:4px">' + escHtml(title) + '</h1>'
    + (p.description ? '<p style="font-size:0.88rem;color:rgba(209,213,219,0.8);line-height:1.5">' + escHtml(p.description) + '</p>' : '')
    + '</div></div>'
    // Info grid
    + '<div class="info-grid">'
    + '<div class="card info-card"><div class="info-label">Szerver típus</div><div class="info-value">' + escHtml(gameLabel || 'Szerver') + '</div></div>'
    + '<div class="card info-card"><div class="info-label">Csomag</div><div class="info-value">' + escHtml(PLAN_LABELS[srv.plan] || srv.plan || '—') + '</div></div>'
    + '<div class="card info-card"><div class="info-label">RAM</div><div class="info-value">' + escHtml(srv.ram || '—') + ' GB</div></div>'
    + '<div class="card info-card"><div class="info-label">Státusz</div><div class="info-value">' + (srv.status === 'running' ? '✅ Online' : srv.status === 'paused' ? '⏸ Szünetel' : '⚪ Offline') + '</div></div>'
    + '</div>'
    // IP
    + (ipHtml ? '<div style="margin-bottom:20px">' + ipHtml + '</div>' : '')
    // Tags
    + (tagsHtml ? '<div style="margin-bottom:20px">' + tagsHtml + '</div>' : '')
    // Footer
    + '<div style="text-align:center;padding:32px 0 0;border-top:1px solid rgba(255,255,255,0.06)">'
    + '<p style="font-size:0.82rem;color:rgba(107,114,128,0.6);margin-bottom:12px">Szervered lenne az AeroHoston?</p>'
    + '<a href="/" class="btn btn-purple"><div class="bp-bg"></div><span>Megnézem az árakat →</span></a>'
    + '</div>'
    + '</div>';

  document.getElementById('app').innerHTML = html;
}

// ── Fetch és döntés ───────────────────────────────────────────────────────
fetch('/api/public/server/' + encodeURIComponent(slug))
  .then(function(r) {
    if (r.status === 404) throw new Error('not_found');
    return r.json();
  })
  .then(function(data) {
    // Ha van aktív coming soon ÉS a szerver még nem "running"
    if (data.comingSoon && data.comingSoon.active) {
      renderComingSoon(data);
    } else {
      renderLiveServer(data);
    }
  })
  .catch(function(err) {
    document.getElementById('app').innerHTML = '<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px">'
      + '<div style="font-size:3rem;margin-bottom:16px">🎮</div>'
      + '<h1 style="font-size:1.5rem;font-weight:800;color:#fff;margin-bottom:8px">Szerver nem található</h1>'
      + '<p style="color:rgba(107,114,128,0.7);margin-bottom:24px">Ez a szerver nem létezik vagy nem nyilvános.</p>'
      + '<a href="/" class="btn btn-ghost">Vissza a főoldalra</a>'
      + '</div>';
  });
</script>
</body></html>
