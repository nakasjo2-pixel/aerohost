<!DOCTYPE html>
<html lang="hu" class="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Szerver | AeroHost</title>
<meta name="description" content="Game szerver oldal">
<link rel="icon" href="logo.png">
<link rel="stylesheet" href="_next/static/chunks/a5f94a35a4f4cbe8.css" data-precedence="next">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Geist","Geist Fallback",ui-sans-serif,system-ui,sans-serif;background:#000;color:#e2e8f0;min-height:100vh;-webkit-font-smoothing:antialiased}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes ping{75%,100%{transform:scale(2);opacity:0}}
@keyframes countdown-tick{0%{transform:scale(1.1)}100%{transform:scale(1)}}
@keyframes gradient-x{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}

.fade-up{animation:fadeUp 0.55s ease-out forwards}
.animate-pulse{animation:pulse 2s cubic-bezier(0.4,0,0.6,1) infinite}
.animate-ping{animation:ping 1.5s cubic-bezier(0,0,0.2,1) infinite}

/* NAV */
.nav{position:fixed;top:20px;left:0;right:0;z-index:50;display:flex;justify-content:center}
.nav-inner{display:flex;align-items:center;justify-content:space-between;width:95%;max-width:1152px;border-radius:50px;overflow:hidden;border:1px solid rgba(255,255,255,0.10);box-shadow:0 4px 8px rgba(0,0,0,0.4);backdrop-filter:blur(20px) saturate(1.2);background:rgba(5,5,5,0.85);padding:0 24px;height:56px}
.nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none}
.nav-brand img{width:38px;height:38px;border-radius:50%;border:1px solid rgba(255,255,255,0.08)}
.nav-brand span{font-weight:700;font-size:1.2rem;color:#fff;letter-spacing:-0.02em}
.nav-btn{display:inline-flex;align-items:center;gap:8px;padding:8px 20px;border-radius:50px;font-size:0.82rem;font-weight:600;text-decoration:none;transition:all 0.2s;cursor:pointer;border:none;font-family:inherit}
.nav-btn-ghost{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.12);color:rgba(209,213,219,0.9)}
.nav-btn-ghost:hover{background:rgba(255,255,255,0.09);color:#fff}
.nav-btn-purple{position:relative;overflow:hidden;color:#fff;box-shadow:0 6px 16px -6px rgba(168,85,247,0.5)}
.nav-btn-purple .bg{position:absolute;inset:0;background:linear-gradient(135deg,#1d4ed8,#7c3aed,#4338ca);z-index:0}
.nav-btn-purple span{position:relative;z-index:1}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:99px;font-size:0.72rem;font-weight:600}
.badge-green{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.2);color:#4ade80}
.badge-yellow{background:rgba(234,179,8,0.1);border:1px solid rgba(234,179,8,0.2);color:#facc15}
.badge-red{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#f87171}
.badge-purple{background:rgba(168,85,247,0.1);border:1px solid rgba(168,85,247,0.2);color:#c084fc}
.badge-blue{background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.2);color:#60a5fa}

/* CARD */
.card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:20px;backdrop-filter:blur(8px)}
.card-hover{transition:border-color 0.2s,background 0.2s}
.card-hover:hover{border-color:rgba(168,85,247,0.25);background:rgba(255,255,255,0.05)}

/* BTN */
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 20px;border-radius:12px;font-size:0.88rem;font-weight:600;border:none;cursor:pointer;transition:all 0.2s;font-family:inherit;text-decoration:none}
.btn-purple{position:relative;overflow:hidden;color:#fff;box-shadow:0 6px 16px -6px rgba(168,85,247,0.45)}
.btn-purple .bp-bg{position:absolute;inset:0;background:linear-gradient(135deg,#1d4ed8,#7c3aed,#4338ca);z-index:0}
.btn-purple .bp-bg-hover{position:absolute;inset:0;background:linear-gradient(90deg,#3A29FF,#A855F7,#4f46e5);opacity:0;z-index:0;transition:opacity 0.4s}
.btn-purple:hover .bp-bg-hover{opacity:1}
.btn-purple span{position:relative;z-index:1;display:flex;align-items:center;gap:7px}
.btn-ghost{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.10);color:rgba(209,213,219,0.9)}
.btn-ghost:hover{background:rgba(255,255,255,0.09);color:#fff}

/* HERO */
.hero-section{position:relative;min-height:420px;display:flex;align-items:flex-end;overflow:hidden}
.hero-bg{position:absolute;inset:0;z-index:0}
.hero-bg img{width:100%;height:100%;object-fit:cover;opacity:0.55}
.hero-bg-grad{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,0.3) 0%,rgba(0,0,0,0.95) 100%)}
.hero-bg-grad2{position:absolute;inset:0;background:linear-gradient(to right,rgba(124,58,237,0.12) 0%,transparent 60%)}
.hero-content{position:relative;z-index:1;width:100%;max-width:960px;margin:0 auto;padding:120px 24px 48px}

/* MAIN CONTENT */
.page-wrap{max-width:960px;margin:0 auto;padding:40px 24px 80px}

/* INFO GRID */
.info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-bottom:28px}
.info-card{padding:20px 22px}
.info-label{font-size:0.65rem;color:rgba(107,114,128,0.7);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:7px}
.info-value{font-size:1rem;font-weight:700;color:#fff}

/* IP BOX */
.ip-box{background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.09);border-radius:16px;padding:16px 20px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:border-color 0.2s,background 0.2s;margin-bottom:24px}
.ip-box:hover{border-color:rgba(168,85,247,0.4);background:rgba(168,85,247,0.04)}

/* TAGS */
.tag{padding:4px 12px;background:rgba(168,85,247,0.08);border:1px solid rgba(168,85,247,0.2);border-radius:8px;font-size:0.75rem;color:#c084fc;display:inline-block;margin:3px}

/* COMING SOON */
.cs-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center;position:relative;overflow:hidden;background:#000}
.cs-bg{position:absolute;inset:0;background:radial-gradient(ellipse at center top,rgba(124,58,237,0.2) 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(29,78,216,0.14) 0%,transparent 50%);pointer-events:none}
.cs-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.015) 1px,transparent 1px);background-size:64px 64px;pointer-events:none}
.cs-logo{display:inline-flex;align-items:center;gap:10px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.09);border-radius:50px;padding:8px 22px 8px 8px;margin-bottom:36px;text-decoration:none}
.cs-title{font-size:clamp(2.2rem,6vw,3.8rem);font-weight:900;color:#fff;letter-spacing:-0.03em;line-height:1.1;margin-bottom:16px}
.cs-sub{font-size:1rem;color:rgba(156,163,175,0.8);max-width:460px;line-height:1.7;margin-bottom:40px}
.cs-game-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 16px;border-radius:99px;background:rgba(168,85,247,0.08);border:1px solid rgba(168,85,247,0.22);color:#c084fc;font-size:0.78rem;font-weight:600;margin-bottom:24px}
.countdown-wrap{display:flex;gap:14px;justify-content:center;margin-bottom:40px;flex-wrap:wrap}
.count-box{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.09);border-radius:20px;padding:22px 28px;min-width:90px;text-align:center}
.count-num{font-size:2.5rem;font-weight:800;color:#fff;line-height:1;font-variant-numeric:tabular-nums;display:block}
.count-num.tick{animation:countdown-tick 0.3s ease-out}
.count-label{font-size:0.62rem;color:rgba(107,114,128,0.6);text-transform:uppercase;letter-spacing:0.12em;margin-top:8px;display:block}
.cs-discord{display:inline-flex;align-items:center;gap:9px;padding:12px 24px;background:rgba(88,101,242,0.1);border:1px solid rgba(88,101,242,0.25);border-radius:14px;color:#a5b4fc;font-size:0.9rem;font-weight:600;text-decoration:none;transition:background 0.2s}
.cs-discord:hover{background:rgba(88,101,242,0.2)}

/* FOOTER CTA */
.footer-cta{margin-top:48px;padding:32px;border-radius:24px;background:linear-gradient(135deg,rgba(124,58,237,0.08) 0%,rgba(29,78,216,0.05) 100%);border:1px solid rgba(168,85,247,0.15);text-align:center}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="nav-inner">
    <a href="https://aerohost.eu" class="nav-brand">
      <img src="logo.png" alt="AeroHost">
      <span>AeroHost</span>
    </a>
    <div style="display:flex;gap:10px" id="nav-right">
      <a href="https://aerohost.eu/games.html" class="nav-btn nav-btn-ghost">Játékok</a>
      <a href="https://dashboard.aerohost.eu" class="nav-btn nav-btn-purple">
        <div class="bg"></div>
        <span>Vezérlőpult →</span>
      </a>
    </div>
  </div>
</nav>

<div id="app">
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center">
    <div style="width:36px;height:36px;border:3px solid rgba(168,85,247,0.25);border-top-color:#a855f7;border-radius:50%;animation:spin 0.8s linear infinite"></div>
  </div>
</div>

<script>
var SITE_URL = 'https://aerohost.eu';
var API_BASE = window.location.origin;

var pathParts = window.location.pathname.replace(/^\/+|\/+$/g,'').split('/');
var slug = pathParts[pathParts.length - 1] || '';

var GAME_LABELS = {minecraft:'Minecraft',rust:'Rust',cs2:'Counter-Strike 2',palworld:'Palworld',valheim:'Valheim',ark:'ARK: Survival Ascended','project-zomboid':'Project Zomboid',satisfactory:'Satisfactory'};
var GAME_IMGS   = {minecraft:'games/minecraft-bg.jpg',rust:'games/rust-bg.jpg',cs2:'games/cs2-bg.jpg',palworld:'games/palworld-bg.jpg',valheim:'games/valheim-bg.jpg',ark:'games/ark-bg.jpg','project-zomboid':'games/zomboid-bg.jpg',satisfactory:'games/satisfactory-bg.jpg'};
var PLAN_LABELS = {starter:'Starter · 4 GB RAM',pro:'Pro · 8 GB RAM',elite:'Elite · 16 GB RAM'};

function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function copyIp(ip) {
  navigator.clipboard.writeText(ip).then(function(){
    var btn = document.getElementById('copy-ip-btn');
    if (!btn) return;
    btn.textContent = '✓ Másolva!';
    btn.style.background = 'rgba(34,197,94,0.15)';
    btn.style.borderColor = 'rgba(34,197,94,0.3)';
    btn.style.color = '#4ade80';
    setTimeout(function(){
      btn.textContent = 'Másolás';
      btn.style.background = '';
      btn.style.borderColor = '';
      btn.style.color = '';
    }, 2000);
  });
}

// ── COMING SOON ───────────────────────────────────────────────────────────
function renderComingSoon(data) {
  var cs  = data.comingSoon;
  var srv = data.server;
  var p   = data.profile;

  document.title = (p.title || srv.name || 'Szerver') + ' — Hamarosan | AeroHost';

  var gameLabel = GAME_LABELS[srv.game] || srv.game || '';
  var gameBadge = gameLabel
    ? '<div class="cs-game-badge"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="16" height="16" x="4" y="4" rx="2"/><rect width="6" height="6" x="9" y="9" rx="1"/></svg>' + escHtml(gameLabel) + '</div>'
    : '';

  var countdownHtml = cs.launchAt
    ? '<div class="countdown-wrap" id="countdown-wrap">'
      + '<div class="count-box"><span class="count-num" id="cd-days">00</span><span class="count-label">Nap</span></div>'
      + '<div class="count-box"><span class="count-num" id="cd-hours">00</span><span class="count-label">Óra</span></div>'
      + '<div class="count-box"><span class="count-num" id="cd-mins">00</span><span class="count-label">Perc</span></div>'
      + '<div class="count-box"><span class="count-num" id="cd-secs">00</span><span class="count-label">Másodperc</span></div>'
      + '</div>'
    : '';

  var discordHtml = cs.discordUrl
    ? '<a href="' + escHtml(cs.discordUrl) + '" target="_blank" rel="noopener" class="cs-discord" style="margin-top:8px">'
      + '<svg width="18" height="18" viewBox="0 0 24 24" fill="#5865F2"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128c.126-.094.252-.192.372-.292a.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>'
      + 'Csatlakozz a Discordra'
      + '</a>'
    : '';

  var bgStyle = cs.bgColor && cs.bgColor !== '#060611' ? 'background:' + cs.bgColor + ';' : '';

  document.getElementById('app').innerHTML =
    '<div class="cs-wrap" style="' + bgStyle + '">'
    + '<div class="cs-bg"></div>'
    + '<div class="cs-grid"></div>'
    + '<a href="' + SITE_URL + '" class="cs-logo"><img src="logo.png" width="30" height="30" style="border-radius:50%"><span style="font-size:1.05rem;font-weight:800;color:#fff">AeroHost</span></a>'
    + gameBadge
    + '<h1 class="cs-title fade-up">' + escHtml(cs.headline || 'Hamarosan nyitunk!') + '</h1>'
    + (cs.subtext ? '<p class="cs-sub fade-up">' + escHtml(cs.subtext) + '</p>' : '')
    + countdownHtml
    + discordHtml
    + '<div style="position:absolute;bottom:24px;font-size:0.72rem;color:rgba(107,114,128,0.4)">Powered by <a href="' + SITE_URL + '" style="color:rgba(168,85,247,0.6);text-decoration:none">AeroHost</a></div>'
    + '</div>';

  if (cs.launchAt) {
    var target = new Date(cs.launchAt).getTime();
    var pad = function(n){ return String(Math.max(0,n)).padStart(2,'0'); };
    function tick() {
      var diff = target - Date.now();
      if (diff <= 0) {
        var cw = document.getElementById('countdown-wrap');
        if (cw) cw.innerHTML = '<div style="font-size:1.3rem;font-weight:700;color:#4ade80;padding:20px">🎉 Megnyitott!</div>';
        return;
      }
      var vals = {
        days:  Math.floor(diff / 86400000),
        hours: Math.floor((diff % 86400000) / 3600000),
        mins:  Math.floor((diff % 3600000) / 60000),
        secs:  Math.floor((diff % 60000) / 1000)
      };
      Object.keys(vals).forEach(function(k) {
        var el = document.getElementById('cd-' + k);
        if (!el) return;
        var str = pad(vals[k]);
        if (el.textContent !== str) {
          el.textContent = str;
          el.classList.remove('tick');
          void el.offsetWidth;
          el.classList.add('tick');
        }
      });
    }
    tick();
    setInterval(tick, 1000);
  }
}

// ── LIVE SERVER ───────────────────────────────────────────────────────────
function renderLiveServer(data) {
  var srv = data.server;
  var p   = data.profile;

  var title     = p.title || srv.name || 'Szerver';
  var gameLabel = GAME_LABELS[srv.game] || srv.game || '';
  var imgSrc    = GAME_IMGS[srv.game] || 'Backgrounds/game-bg.png';

  document.title = title + ' | AeroHost';
  document.querySelector('meta[name="description"]').setAttribute('content',
    p.description || title + ' — game szerver az AeroHoston');

  var statusBadge = srv.status === 'running'
    ? '<span class="badge badge-green"><span style="width:5px;height:5px;border-radius:50%;background:#4ade80;display:inline-block" class="animate-pulse"></span>Online</span>'
    : (srv.status === 'paused'
      ? '<span class="badge badge-yellow">Szünetel</span>'
      : '<span class="badge badge-red">Offline</span>');

  var tagsHtml = p.tags
    ? p.tags.split(',').map(function(t){ return '<span class="tag">' + escHtml(t.trim()) + '</span>'; }).join('')
    : '';

  var ipValue = 'play.' + escHtml(slug) + '.aerohost.eu';
  var ipHtml = srv.showIp
    ? '<div class="ip-box" onclick="copyIp(\'' + ipValue + '\')">'
      + '<div style="width:38px;height:38px;border-radius:10px;background:rgba(168,85,247,0.1);border:1px solid rgba(168,85,247,0.2);display:flex;align-items:center;justify-content:center;flex-shrink:0">'
      + '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>'
      + '</div>'
      + '<div style="flex:1">'
      + '<div style="font-size:0.62rem;color:rgba(107,114,128,0.6);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:4px">Szerver IP — kattints a másoláshoz</div>'
      + '<div style="font-size:1rem;font-weight:700;color:#fff;font-family:\'Geist Mono\',monospace">' + ipValue + '</div>'
      + '</div>'
      + '<button id="copy-ip-btn" style="background:rgba(168,85,247,0.1);border:1px solid rgba(168,85,247,0.25);border-radius:9px;color:#c084fc;font-size:0.78rem;font-weight:600;padding:7px 16px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all 0.2s">Másolás</button>'
      + '</div>'
    : '';

  var html =
    // Hero section
    '<div class="hero-section">'
    + '<div class="hero-bg">'
    + '<img src="' + imgSrc + '" alt="' + escHtml(title) + '">'
    + '<div class="hero-bg-grad"></div>'
    + '<div class="hero-bg-grad2"></div>'
    + '</div>'
    + '<div class="hero-content fade-up">'
    + '<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap">'
    + statusBadge
    + (gameLabel ? '<span class="badge badge-purple">' + escHtml(gameLabel) + '</span>' : '')
    + '</div>'
    + '<h1 style="font-size:clamp(2rem,5vw,3rem);font-weight:900;color:#fff;letter-spacing:-0.03em;line-height:1.1;margin-bottom:10px">' + escHtml(title) + '</h1>'
    + (p.description ? '<p style="font-size:0.95rem;color:rgba(209,213,219,0.75);line-height:1.6;max-width:560px">' + escHtml(p.description) + '</p>' : '')
    + '</div>'
    + '</div>'

    // Main content
    + '<div class="page-wrap fade-up">'

    // Info grid
    + '<div class="info-grid">'
    + _infoCard('Játék', escHtml(gameLabel || '—'), '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="2"><rect width="16" height="16" x="4" y="4" rx="2"/><rect width="6" height="6" x="9" y="9" rx="1"/></svg>')
    + _infoCard('Csomag', escHtml(PLAN_LABELS[srv.plan] || srv.plan || '—'), '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>')
    + _infoCard('RAM', (srv.ram || '—') + ' GB', '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="2"><rect width="20" height="8" x="2" y="14" rx="2"/><path d="M6 14v-3a6 6 0 0 1 12 0v3"/></svg>')
    + _infoCard('Státusz', srv.status === 'running' ? 'Online' : srv.status === 'paused' ? 'Szünetel' : 'Offline', '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="' + (srv.status==='running'?'#4ade80':srv.status==='paused'?'#facc15':'#f87171') + '" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>')
    + '</div>'

    // IP
    + (ipHtml ? ipHtml : '')

    // Tags
    + (tagsHtml ? '<div style="margin-bottom:28px">' + tagsHtml + '</div>' : '')

    // Footer CTA
    + '<div class="footer-cta">'
    + '<div style="width:48px;height:48px;border-radius:14px;background:rgba(168,85,247,0.1);border:1px solid rgba(168,85,247,0.2);display:flex;align-items:center;justify-content:center;margin:0 auto 16px">'
    + '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="16" height="16" x="4" y="4" rx="2"/><rect width="6" height="6" x="9" y="9" rx="1"/><path d="M15 2v2M15 20v2M2 15h2M2 9h2M20 15h2M20 9h2M9 2v2M9 20v2"/></svg>'
    + '</div>'
    + '<p style="font-size:0.85rem;color:rgba(107,114,128,0.7);margin-bottom:16px">Neked is kellene egy ilyen szerver?</p>'
    + '<a href="' + SITE_URL + '/games.html" class="btn btn-purple"><div class="bp-bg"></div><div class="bp-bg-hover"></div><span>Megnézem az árakat →</span></a>'
    + '</div>'
    + '</div>';

  document.getElementById('app').innerHTML = html;
}

function _infoCard(label, value, icon) {
  return '<div class="card info-card card-hover">'
    + '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">'
    + '<div style="width:28px;height:28px;border-radius:8px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center">' + icon + '</div>'
    + '<div class="info-label" style="margin:0">' + label + '</div>'
    + '</div>'
    + '<div class="info-value">' + value + '</div>'
    + '</div>';
}

// ── NOT FOUND ─────────────────────────────────────────────────────────────
function renderNotFound() {
  document.getElementById('app').innerHTML =
    '<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;background:#000">'
    + '<div style="position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(124,58,237,0.12) 0%,transparent 60%);pointer-events:none"></div>'
    + '<div style="position:relative;z-index:1">'
    + '<div style="width:72px;height:72px;border-radius:20px;background:rgba(168,85,247,0.1);border:1px solid rgba(168,85,247,0.2);display:flex;align-items:center;justify-content:center;margin:0 auto 24px">'
    + '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'
    + '</div>'
    + '<h1 style="font-size:1.75rem;font-weight:800;color:#fff;margin-bottom:10px;letter-spacing:-0.02em">Szerver nem található</h1>'
    + '<p style="color:rgba(107,114,128,0.7);margin-bottom:28px;font-size:0.95rem">Ez a szerver nem létezik vagy nem nyilvános.</p>'
    + '<a href="' + SITE_URL + '" class="btn btn-ghost">← Vissza a főoldalra</a>'
    + '</div></div>';
}

// ── FETCH ─────────────────────────────────────────────────────────────────
if (!slug) {
  renderNotFound();
} else {
  fetch(API_BASE + '/api/public/server/' + encodeURIComponent(slug))
    .then(function(r) {
      if (r.status === 404) throw new Error('not_found');
      return r.json();
    })
    .then(function(data) {
      if (data.comingSoon && data.comingSoon.active) {
        renderComingSoon(data);
      } else {
        renderLiveServer(data);
      }
    })
    .catch(renderNotFound);
}
</script>
</body>
</html>
